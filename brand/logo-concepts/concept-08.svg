<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="G9">
  <!-- Nine-Grid: nine tiles; the filled ones trace a 9 -->
  <g fill="currentColor">
    <rect x="18" y="18" width="16" height="16" rx="4"/>
    <rect x="42" y="18" width="16" height="16" rx="4"/>
    <rect x="66" y="18" width="16" height="16" rx="4"/>
    <rect x="18" y="42" width="16" height="16" rx="4"/>
    <rect x="66" y="42" width="16" height="16" rx="4"/>
    <rect x="66" y="66" width="16" height="16" rx="4"/>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="3.5">
    <rect x="42.75" y="42.75" width="14.5" height="14.5" rx="3.5"/>
    <rect x="18.75" y="66.75" width="14.5" height="14.5" rx="3.5"/>
    <rect x="42.75" y="66.75" width="14.5" height="14.5" rx="3.5"/>
  </g>
</svg>
